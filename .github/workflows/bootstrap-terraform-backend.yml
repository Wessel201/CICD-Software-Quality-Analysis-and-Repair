name: Bootstrap Terraform Backend

on:
  workflow_dispatch:
    inputs:
      state_bucket:
        description: S3 bucket name for Terraform state
        required: true
        default: code-quality-terraform-state-prod-931756997325
      lock_table:
        description: DynamoDB table name for Terraform state locking
        required: true
        default: code-quality-terraform-locks-prod

permissions:
  contents: read

env:
  AWS_REGION: eu-central-1

jobs:
  bootstrap-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create or verify S3 bucket
        env:
          STATE_BUCKET: ${{ github.event.inputs.state_bucket }}
        run: |
          set -euo pipefail

          if aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            echo "S3 bucket already exists: $STATE_BUCKET"
          else
            aws s3api create-bucket \
              --bucket "$STATE_BUCKET" \
              --region "$AWS_REGION" \
              --create-bucket-configuration LocationConstraint="$AWS_REGION"
            echo "Created S3 bucket: $STATE_BUCKET"
          fi

          aws s3api put-bucket-versioning \
            --bucket "$STATE_BUCKET" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "$STATE_BUCKET" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

      - name: Create or verify DynamoDB lock table
        env:
          LOCK_TABLE: ${{ github.event.inputs.lock_table }}
        run: |
          set -euo pipefail

          if aws dynamodb describe-table --table-name "$LOCK_TABLE" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "DynamoDB table already exists: $LOCK_TABLE"
          else
            aws dynamodb create-table \
              --table-name "$LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$AWS_REGION"

            aws dynamodb wait table-exists \
              --table-name "$LOCK_TABLE" \
              --region "$AWS_REGION"

            echo "Created DynamoDB table: $LOCK_TABLE"
          fi

      - name: Backend bootstrap summary
        env:
          STATE_BUCKET: ${{ github.event.inputs.state_bucket }}
          LOCK_TABLE: ${{ github.event.inputs.lock_table }}
        run: |
          echo "Terraform backend is ready."
          echo "Set GitHub secret TF_STATE_BUCKET to: $STATE_BUCKET"
          echo "Set GitHub secret TF_LOCK_TABLE to: $LOCK_TABLE"
