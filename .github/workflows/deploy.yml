name: Production Deployment Pipeline

# Requirement #5: Automated deployment when a new push is made
on:
  push:
    branches:
      - main

# Define your environment variables here to keep the script clean
env:
  AWS_REGION: "eu-central-1"
  API_ECR_REPO: "code-quality-api"
  WORKER_ECR_REPO: "code-quality-worker"
  ECS_CLUSTER: "code-quality-cluster"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab the latest code from your repository
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Authenticate securely with AWS using GitHub Secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Setup and Run Terraform (Infrastructure as Code)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply
        working-directory: ./terraform
        env:
          # Securely inject BOTH sensitive variables for Terraform
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
        run: |
          terraform init
          terraform apply -auto-approve

      # 4. Log in to Amazon Elastic Container Registry (ECR)
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 5. Build, Tag, and Push the API Docker Image
      - name: Build and Push API Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd app/api
          docker build -t $REGISTRY/$API_ECR_REPO:$IMAGE_TAG -t $REGISTRY/$API_ECR_REPO:latest .
          docker push -a $REGISTRY/$API_ECR_REPO

      # 6. Build, Tag, and Push the Worker Docker Image
      - name: Build and Push Worker Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd app/worker
          docker build -t $REGISTRY/$WORKER_ECR_REPO:$IMAGE_TAG -t $REGISTRY/$WORKER_ECR_REPO:latest .
          docker push -a $REGISTRY/$WORKER_ECR_REPO

      # ---------------------------------------------------
      # 7. PROPER ECS DEPLOYMENT FOR API
      # ---------------------------------------------------
      - name: Download current API task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition api-task \
            --query taskDefinition > api-task-def.json

      - name: Render new API image into task definition
        id: render-api-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: api-task-def.json
          container-name: api-container
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.API_ECR_REPO }}:${{ github.sha }}

      - name: Deploy API to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-api-task.outputs.task-definition }}
          service: api-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ---------------------------------------------------
      # 8. PROPER ECS DEPLOYMENT FOR WORKER
      # ---------------------------------------------------
      - name: Download current Worker task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition worker-task \
            --query taskDefinition > worker-task-def.json

      - name: Render new Worker image into task definition
        id: render-worker-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: worker-task-def.json
          container-name: worker-container
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.WORKER_ECR_REPO }}:${{ github.sha }}

      - name: Deploy Worker to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-worker-task.outputs.task-definition }}
          service: worker-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true