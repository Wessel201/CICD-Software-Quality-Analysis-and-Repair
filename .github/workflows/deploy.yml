name: Production Deployment Pipeline

# Requirement #5: Automated deployment when a new push is made
on:
  push:
    branches:
      - main

# Define your environment variables here to keep the script clean
env:
  AWS_REGION: "eu-central-1"
  API_ECR_REPO: "code-quality-api"
  WORKER_ECR_REPO: "code-quality-worker"
  ECS_CLUSTER: "code-quality-cluster"
  TF_STATE_KEY: "prod/terraform.tfstate"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab the latest code from your repository
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Authenticate securely with AWS using GitHub Secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Setup and Run Terraform (Infrastructure as Code)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply
        id: tf-apply
        working-directory: ./terraform
        env:
          # Securely inject BOTH sensitive variables for Terraform
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_api_key: ${{ secrets.API_KEY }}
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
          TF_STATE_KEY: ${{ env.TF_STATE_KEY }}
        run: |
          if [ -z "$TF_STATE_BUCKET" ] || [ -z "$TF_LOCK_TABLE" ]; then
            echo "Missing TF_STATE_BUCKET or TF_LOCK_TABLE secret."
            exit 1
          fi

          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="dynamodb_table=$TF_LOCK_TABLE" \
            -backend-config="encrypt=true"
          terraform apply -auto-approve

          ALB_DNS_NAME="$(terraform output -raw alb_dns_name)"
          if [ -z "$ALB_DNS_NAME" ]; then
            echo "Failed to read Terraform output alb_dns_name."
            exit 1
          fi

          echo "ALB_URL=http://${ALB_DNS_NAME}" >> "$GITHUB_ENV"

      - name: Sync Vercel Environment Variables
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          API_KEY_SECRET: ${{ secrets.API_KEY }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing one or more Vercel secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID."
            exit 1
          fi

          if [ -z "$API_KEY_SECRET" ]; then
            echo "Missing API_KEY secret."
            exit 1
          fi

          upsert_vercel_env() {
            local key="$1"
            local value="$2"

            local existing_ids
            existing_ids=$(curl -fsSL \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}/env?target=production&teamId=${VERCEL_ORG_ID}" \
              | jq -r --arg key "$key" '.envs[] | select(.key == $key) | .id')

            if [ -n "$existing_ids" ]; then
              while IFS= read -r env_id; do
                [ -z "$env_id" ] && continue
                curl -fsSL -X DELETE \
                  -H "Authorization: Bearer ${VERCEL_TOKEN}" \
                  "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}/env/${env_id}?teamId=${VERCEL_ORG_ID}" \
                  >/dev/null
              done <<< "$existing_ids"
            fi

            curl -fsSL -X POST \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env?teamId=${VERCEL_ORG_ID}" \
              -d "$(jq -nc --arg key "$key" --arg value "$value" '{key: $key, value: $value, type: "encrypted", target: ["production"]}')" \
              >/dev/null
          }

          # API_BASE is server-only and consumed by the Next.js proxy route.
          upsert_vercel_env "API_BASE" "$ALB_URL"

          # API_KEY remains server-only; never expose it as NEXT_PUBLIC_*.
          upsert_vercel_env "API_KEY" "$API_KEY_SECRET"

      # 4. Log in to Amazon Elastic Container Registry (ECR)
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 5. Build, Tag, and Push the API Docker Image
      - name: Build and Push API Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd app/api
          docker build -t $REGISTRY/$API_ECR_REPO:$IMAGE_TAG -t $REGISTRY/$API_ECR_REPO:latest .
          docker push -a $REGISTRY/$API_ECR_REPO

      # 6. Build, Tag, and Push the Worker Docker Image
      - name: Build and Push Worker Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd app/worker
          docker build -t $REGISTRY/$WORKER_ECR_REPO:$IMAGE_TAG -t $REGISTRY/$WORKER_ECR_REPO:latest .
          docker push -a $REGISTRY/$WORKER_ECR_REPO

      # ---------------------------------------------------
      # 7. PROPER ECS DEPLOYMENT FOR API
      # ---------------------------------------------------
      - name: Download current API task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition api-task \
            --query taskDefinition > api-task-def.json

      - name: Render new API image into task definition
        id: render-api-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: api-task-def.json
          container-name: api-container
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.API_ECR_REPO }}:${{ github.sha }}

      - name: Deploy API to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-api-task.outputs.task-definition }}
          service: api-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ---------------------------------------------------
      # 8. PROPER ECS DEPLOYMENT FOR WORKER
      # ---------------------------------------------------
      - name: Download current Worker task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition worker-task \
            --query taskDefinition > worker-task-def.json

      - name: Render new Worker image into task definition
        id: render-worker-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: worker-task-def.json
          container-name: worker-container
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.WORKER_ECR_REPO }}:${{ github.sha }}

      - name: Deploy Worker to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-worker-task.outputs.task-definition }}
          service: worker-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true