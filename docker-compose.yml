services:
  postgres:
    image: postgres:16
    container_name: cq_postgres
    environment:
      POSTGRES_DB: codequality
      POSTGRES_USER: postgres_admin
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_admin -d codequality"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./app/api
      dockerfile: Dockerfile
    container_name: cq_api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres_admin:app@postgres:5432/codequality
      AUTO_INIT_DB: "true"
      API_KEY: ${API_KEY:-prototype_api_key}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/code/uploads

  worker:
    build:
      context: ./app/worker
    container_name: cq_worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres_admin:app@postgres:5432/codequality
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/uploads

volumes:
  postgres_data:
  uploads_data:
